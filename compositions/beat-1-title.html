<template id="beat-1-template">
  <div data-hf-id="hf-b1" data-composition-id="beat-1" data-width="1920" data-height="1080" data-duration="10.0">
    <!-- Ambient Drifting Background (full-bleed child holds background-color) -->
    <div data-hf-id="hf-vrso" class="ambient-bg">
      <div data-hf-id="hf-4t5u" class="orb orb-1"></div>
      <div data-hf-id="hf-0v1t" class="orb orb-2"></div>
      <div data-hf-id="hf-03e0" class="orb orb-3"></div>
      <div data-hf-id="hf-55zt" class="noise-overlay"></div>
    </div>
    
    <!-- Background Grid -->
    <img data-hf-id="hf-q8sb" class="bg-grid" src="assets/swiss-grid.svg" alt="Grid">

    <!-- Main Container Card -->
    <div data-hf-id="hf-6w4o" class="glass-card" id="title-card">
      <h1 data-hf-id="hf-svwu" class="title">Quality Engineering</h1>
      <p data-hf-id="hf-kwto" class="subtitle">Evolving from finding bugs to building quality in.</p>
      <div data-hf-id="hf-us5s" class="speaker-info">
        <p data-hf-id="hf-pwm1" class="name">Andrew Darnell</p>
        <p data-hf-id="hf-owfm" class="role">Principal Test Engineer</p>
      </div>
    </div>

    <style>
      @font-face {
        font-family: "Space Grotesk";
        src: url("capture/assets/fonts/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gOoraIAEj7oUUsj.ttf") format("truetype");
        font-weight: 400;
      }
      @font-face {
        font-family: "Space Grotesk";
        src: url("capture/assets/fonts/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gOoraIAEj4PVksj.ttf") format("truetype");
        font-weight: 700;
      }
      @font-face {
        font-family: "Inter";
        src: url("capture/assets/fonts/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfMZg.ttf") format("truetype");
        font-weight: 400;
      }
      @font-face {
        font-family: "Inter";
        src: url("capture/assets/fonts/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuGKYMZg.ttf") format("truetype");
        font-weight: 600;
      }

      * {
        box-sizing: border-box;
      }

      [data-composition-id="beat-1"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        font-family: "Inter", sans-serif;
        color: #e2e8f0;
        overflow: hidden;
      }

      /* Ambient Background */
      .ambient-bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background-color: #0f1115;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.15;
      }
      .orb-1 {
        width: 600px;
        height: 600px;
        background-color: #0ea5e9;
        top: -100px;
        left: -100px;
      }
      .orb-2 {
        width: 500px;
        height: 500px;
        background-color: #a855f7;
        bottom: -100px;
        right: -100px;
      }
      .orb-3 {
        width: 400px;
        height: 400px;
        background-color: #10b981;
        top: 300px;
        left: 50%;
        transform: translateX(-50%);
      }
      .noise-overlay {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle, transparent 20%, #0f1115 80%);
        opacity: 0.8;
      }

      .bg-grid {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.08;
        z-index: 1;
      }

      /* Container Card */
      .glass-card {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        background: rgba(26, 29, 36, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 80px 100px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 2;
        text-align: center;
      }

      .title {
        font-family: "Space Grotesk", sans-serif;
        font-size: 80px;
        font-weight: 700;
        margin: 0 0 20px 0;
        background: linear-gradient(135deg, #ffffff 40%, #0ea5e9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -2px;
        line-height: 1.1;
      }

      .subtitle {
        font-size: 28px;
        color: #94a3b8;
        margin: 0 0 50px 0;
        line-height: 1.4;
      }

      .speaker-info {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 30px;
        display: inline-block;
      }

      .name {
        font-family: "Space Grotesk", sans-serif;
        font-size: 24px;
        font-weight: 600;
        color: #e2e8f0;
        margin: 0 0 5px 0;
      }

      .role {
        font-size: 16px;
        color: #0ea5e9;
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        // Resolve dynamic timing configuration
        const masterDuration = (window.parent && window.parent.MASTER_BEAT_DURATION) || 10;
        const mult = (window.parent && window.parent.BEAT_MULTIPLIERS && window.parent.BEAT_MULTIPLIERS["beat-1"]) || 1.0;
        const duration = masterDuration * mult;

        // Dynamically update template root duration attribute
        const root = document.querySelector("[data-composition-id]");
        root.setAttribute("data-duration", duration);

        // Scale relative to original design baseline of 3.5 seconds
        const scale = duration / 3.5;

        const tl = gsap.timeline({ paused: true });

        // Entrance animations (scaled)
        tl.fromTo("#title-card", 
          { opacity: 0, scale: 0.96 }, 
          { opacity: 1, scale: 1, duration: 0.8 * scale, ease: "power3.out" }, 
          0.1 * scale
        );

        tl.fromTo(".title", 
          { y: 30, opacity: 0 }, 
          { y: 0, opacity: 1, duration: 0.6 * scale, ease: "power2.out" }, 
          0.3 * scale
        );

        tl.fromTo(".subtitle", 
          { y: 20, opacity: 0 }, 
          { y: 0, opacity: 1, duration: 0.6 * scale, ease: "power2.out" }, 
          0.5 * scale
        );

        tl.fromTo(".speaker-info", 
          { y: 15, opacity: 0 }, 
          { y: 0, opacity: 1, duration: 0.5 * scale, ease: "power2.out" }, 
          0.7 * scale
        );

        // Continuous camera drift
        tl.to("[data-composition-id='beat-1']", {
          scale: 1.03,
          duration: duration,
          ease: "sine.inOut"
        }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["beat-1"] = tl;
      })();
    </script>
  </div>
</template>
