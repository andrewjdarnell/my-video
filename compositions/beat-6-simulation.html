    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        // Resolve dynamic timing configuration
        const masterDuration = (window.parent && window.parent.MASTER_BEAT_DURATION) || 10;
        const mult = (window.parent && window.parent.BEAT_MULTIPLIERS && window.parent.BEAT_MULTIPLIERS["beat-6"]) || 4.2;
        const duration = masterDuration * mult;

        // Dynamically update template root duration attribute
        const root = document.querySelector("[data-composition-id]");
        root.setAttribute("data-duration", duration);

        // Scale relative to original design baseline of 7.0 seconds
        const scale = duration / 7.0;

        const tl = gsap.timeline({ paused: true });

        // Entrance (scaled)
        tl.fromTo(".main-container", 
          { opacity: 0, scale: 0.98 }, 
          { opacity: 1, scale: 1, duration: 0.8 * scale, ease: "power2.out" }, 
          0.0
        );

        // Sprint counter sweep (Sprint 1 to 10 releases over 24.0 seconds)
        const sprintCounter = { val: 1 };
        tl.to(sprintCounter, {
          val: 10,
          duration: 6.0 * scale,
          ease: "none",
          onUpdate: function() {
            document.getElementById("sprint-counter").innerText = Math.round(sprintCounter.val);
          }
        }, 0.5 * scale);

        // ----------------------------------------------------
        // QE PIPELINE ANIMATION (scaled)
        // ----------------------------------------------------
        // Block 1
        tl.fromTo("#qe-block-1", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 0.5 * scale);
        tl.to("#qe-block-1", { x: 420, duration: 1.0 * scale, ease: "none" }, 0.5 * scale);
        tl.to("#qe-block-1", { className: "code-block qe-block verified", duration: 0.1 * scale }, 1.5 * scale);
        tl.to("#qe-block-1", { opacity: 0, y: -20, duration: 0.3 * scale }, 1.6 * scale);

        // Block 2
        tl.fromTo("#qe-block-2", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 1.3 * scale);
        tl.to("#qe-block-2", { x: 420, duration: 1.0 * scale, ease: "none" }, 1.3 * scale);
        tl.to("#qe-block-2", { className: "code-block qe-block verified", duration: 0.1 * scale }, 2.3 * scale);
        tl.to("#qe-block-2", { opacity: 0, y: -20, duration: 0.3 * scale }, 2.4 * scale);

        // Block 3
        tl.fromTo("#qe-block-3", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 2.1 * scale);
        tl.to("#qe-block-3", { x: 420, duration: 1.0 * scale, ease: "none" }, 2.1 * scale);
        tl.to("#qe-block-3", { className: "code-block qe-block verified", duration: 0.1 * scale }, 3.1 * scale);
        tl.to("#qe-block-3", { opacity: 0, y: -20, duration: 0.3 * scale }, 3.2 * scale);

        // Block 4
        tl.fromTo("#qe-block-4", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 2.9 * scale);
        tl.to("#qe-block-4", { x: 420, duration: 1.0 * scale, ease: "none" }, 2.9 * scale);
        tl.to("#qe-block-4", { className: "code-block qe-block verified", duration: 0.1 * scale }, 3.9 * scale);
        tl.to("#qe-block-4", { opacity: 0, y: -20, duration: 0.3 * scale }, 4.0 * scale);

        // Block 5
        tl.fromTo("#qe-block-5", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 3.7 * scale);
        tl.to("#qe-block-5", { x: 420, duration: 1.0 * scale, ease: "none" }, 3.7 * scale);
        tl.to("#qe-block-5", { className: "code-block qe-block verified", duration: 0.1 * scale }, 4.7 * scale);
        tl.to("#qe-block-5", { opacity: 0, y: -20, duration: 0.3 * scale }, 4.8 * scale);

        // Block 6
        tl.fromTo("#qe-block-6", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 4.5 * scale);
        tl.to("#qe-block-6", { x: 420, duration: 1.0 * scale, ease: "none" }, 4.5 * scale);
        tl.to("#qe-block-6", { className: "code-block qe-block verified", duration: 0.1 * scale }, 5.5 * scale);
        tl.to("#qe-block-6", { opacity: 0, y: -20, duration: 0.3 * scale }, 5.6 * scale);

        // QE Counters increment
        const qeVerifiedVal = { val: 0 };
        tl.to(qeVerifiedVal, {
          val: 35,
          duration: 5.5 * scale,
          ease: "none",
          onUpdate: function() {
            document.getElementById("qe-verified").innerText = Math.round(qeVerifiedVal.val);
          }
        }, 0.5 * scale);

        // ----------------------------------------------------
        // QA MANUAL PIPELINE ANIMATION (scaled)
        // ----------------------------------------------------
        // Block 1 (Passes QA)
        tl.fromTo("#qa-block-1", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 0.5 * scale);
        tl.to("#qa-block-1", { x: 420, duration: 1.2 * scale, ease: "none" }, 0.5 * scale);
        tl.to("#qa-block-1", { className: "code-block verified", duration: 0.1 * scale }, 1.7 * scale);
        tl.to("#qa-block-1", { opacity: 0, y: -20, duration: 0.3 * scale }, 1.8 * scale);

        // Block 2 (Passes QA slowly)
        tl.fromTo("#qa-block-2", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 1.2 * scale);
        tl.to("#qa-block-2", { x: 420, duration: 1.2 * scale, ease: "none" }, 1.2 * scale);
        tl.to("#qa-block-2", { className: "code-block verified", duration: 0.1 * scale }, 2.4 * scale);
        tl.to("#qa-block-2", { opacity: 0, y: -20, duration: 0.3 * scale }, 2.5 * scale);

        // QA Saturation Trigger (Sprint 3 / 2.0s onwards)
        tl.to("#qa-panel", { className: "showdown-lane qa-lane saturated", duration: 0.2 * scale }, 2.0 * scale);
        tl.to("#qa-status", { textContent: "Saturated / Backlogged", duration: 0.1 * scale }, 2.0 * scale);

        // Block 3 (Slows down and piles up!)
        tl.fromTo("#qa-block-3", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 1.9 * scale);
        tl.to("#qa-block-3", { x: 420, duration: 1.5 * scale, ease: "power1.out" }, 1.9 * scale);
        tl.to("#qa-block-3", { className: "code-block rejected", duration: 0.1 * scale }, 3.4 * scale);

        // Block 4 (Piles up behind block 3)
        tl.fromTo("#qa-block-4", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 2.4 * scale);
        tl.to("#qa-block-4", { x: 340, duration: 1.4 * scale, ease: "power1.out" }, 2.4 * scale);
        tl.to("#qa-block-4", { className: "code-block rejected", duration: 0.1 * scale }, 3.8 * scale);

        // Block 5 (Piles up behind block 4)
        tl.fromTo("#qa-block-5", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 2.9 * scale);
        tl.to("#qa-block-5", { x: 260, duration: 1.3 * scale, ease: "power1.out" }, 2.9 * scale);
        tl.to("#qa-block-5", { className: "code-block rejected", duration: 0.1 * scale }, 4.2 * scale);

        // Block 6 (Piles up behind block 5)
        tl.fromTo("#qa-block-6", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 3.4 * scale);
        tl.to("#qa-block-6", { x: 180, duration: 1.2 * scale, ease: "power1.out" }, 3.4 * scale);
        tl.to("#qa-block-6", { className: "code-block rejected", duration: 0.1 * scale }, 4.6 * scale);

        // Escaped Bugs start flying out from the bottleneck! (Sequentialized)
        // Bug 1
        tl.fromTo("#bug-1", { x: 0, y: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 3.8 * scale);
        tl.to("#bug-1", { x: 100, y: -80, opacity: 0, scale: 1.5, duration: 1.0 * scale, ease: "power1.out" }, 3.9 * scale);

        // Bug 2
        tl.fromTo("#bug-2", { x: 0, y: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 4.5 * scale);
        tl.to("#bug-2", { x: 120, y: -90, opacity: 0, scale: 1.5, duration: 1.0 * scale, ease: "power1.out" }, 4.6 * scale);

        // Bug 3
        tl.fromTo("#bug-3", { x: 0, y: 0, opacity: 0 }, { opacity: 1, duration: 0.1 * scale }, 5.2 * scale);
        tl.to("#bug-3", { x: 80, y: -70, opacity: 0, scale: 1.5, duration: 1.0 * scale, ease: "power1.out" }, 5.3 * scale);

        // QA Counters
        const qaVerifiedVal = { val: 0 };
        tl.to(qaVerifiedVal, {
          val: 5,
          duration: 6.0 * scale,
          ease: "power1.out",
          onUpdate: function() {
            document.getElementById("qa-verified").innerText = Math.round(qaVerifiedVal.val);
          }
        }, 0.5 * scale);

        const qaBugsVal = { val: 0 };
