    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        // Resolve dynamic timing configuration
        const masterDuration = (window.parent && window.parent.MASTER_BEAT_DURATION) || 10;
        const mult = (window.parent && window.parent.BEAT_MULTIPLIERS && window.parent.BEAT_MULTIPLIERS["beat-5"]) || 1.0;
        const duration = masterDuration * mult;

        // Dynamically update template root duration attribute
        const root = document.querySelector("[data-composition-id]");
        root.setAttribute("data-duration", duration);

        // Scale relative to original design baseline of 3.5 seconds
        const scale = duration / 3.5;

        const tl = gsap.timeline({ paused: true });

        // Container entry (scaled)
        tl.fromTo(".main-container", 
          { opacity: 0, y: 50 }, 
          { opacity: 1, y: 0, duration: 0.8 * scale, ease: "power2.out" }, 
          0.0
        );

        // Header Title
        tl.fromTo(".section-title", 
          { opacity: 0, x: -20 }, 
          { opacity: 1, x: 0, duration: 0.6 * scale, ease: "power2.out" }, 
          0.2 * scale
        );

        // Bullet points stagger
        tl.fromTo(".bullet-item", 
          { opacity: 0, x: -25 }, 
          { opacity: 1, x: 0, duration: 0.6 * scale, stagger: 0.15 * scale, ease: "power2.out" }, 
          0.4 * scale
        );

        // SVG Loop Pop
        tl.fromTo(".loop-container", 
          { opacity: 0, scale: 0.9 }, 
          { opacity: 1, scale: 1, duration: 0.8 * scale, ease: "back.out(1.5)" }, 
          0.6 * scale
        );

        // Rotate Loop Emoji (finite duration for loop safety)
        tl.to("#loop-emoji-icon", {
          rotation: 360 * scale,
          duration: duration,
          ease: "none"
        }, 0);

        // Animate Circle Drawing & Tracer Dot Orbit (scaled)
        tl.fromTo("#glowing-circle", 
          { strokeDashoffset: 502 }, 
          { strokeDashoffset: 0, duration: duration - 0.6 * scale, ease: "power1.inOut" }, 
          0.6 * scale
        );

        // Orbit Tracer Dot (360 degrees rotation around center)
        tl.fromTo("#tracer", 
          { rotation: 0 }, 
          { rotation: 360, duration: duration - 0.6 * scale, ease: "power1.inOut" }, 
          0.6 * scale
        );

        // Camera Pan
        tl.to("[data-composition-id='beat-5']", {
          scale: 1.02,
          duration: duration,
          ease: "power1.inOut"
        }, 0);

        window.__timelines = window.__timelines || {};
        window.__timelines["beat-5"] = tl;
      })();
    </script>
