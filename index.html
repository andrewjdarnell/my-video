        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- Initial static template placeholders that will be updated dynamically on load -->
    <div data-hf-id="hf-gqfl" id="master-root" data-composition-id="master" data-width="1920" data-height="1080" data-start="0" data-duration="76">
      <!-- Background Audio Track (Track 0) -->
      <audio data-hf-id="hf-45np" id="bgm" class="clip" src="assets/bgm.mp3" data-start="0" data-duration="76" data-track-index="0"></audio>

      <!-- Sound Effects (Unique Tracks 2-17 to prevent overlap warnings) -->
      <audio data-hf-id="hf-zna7" id="sfx-b1-chime" class="clip" src="assets/sfx/chime.mp3" data-start="0.4" data-duration="2.5" data-track-index="2"></audio>
      <audio data-hf-id="hf-11v2" id="sfx-b2-whoosh" class="clip" src="assets/sfx/whoosh-short.mp3" data-start="7.0" data-duration="0.57" data-track-index="3"></audio>
      <audio data-hf-id="hf-1s5k" id="sfx-b2-error" class="clip" src="assets/sfx/error.mp3" data-start="8.6" data-duration="1.62" data-track-index="4"></audio>
      <audio data-hf-id="hf-qaqh" id="sfx-b3-whoosh" class="clip" src="assets/sfx/whoosh-short.mp3" data-start="14.0" data-duration="0.57" data-track-index="5"></audio>
      <audio data-hf-id="hf-z1l9" id="sfx-b3-chime" class="clip" src="assets/sfx/chime.mp3" data-start="15.6" data-duration="2.5" data-track-index="6"></audio>
      
      <audio data-hf-id="hf-16us" id="sfx-b4-pop1" class="clip" src="assets/sfx/pop.mp3" data-start="22.2" data-duration="0.72" data-track-index="7"></audio>
      <audio data-hf-id="hf-dwix" id="sfx-b4-pop2" class="clip" src="assets/sfx/pop.mp3" data-start="23.6" data-duration="0.72" data-track-index="8"></audio>
      <audio data-hf-id="hf-u31r" id="sfx-b4-pop3" class="clip" src="assets/sfx/pop.mp3" data-start="25.0" data-duration="0.72" data-track-index="9"></audio>
      <audio data-hf-id="hf-zu8d" id="sfx-b4-pop4" class="clip" src="assets/sfx/pop.mp3" data-start="26.4" data-duration="0.72" data-track-index="10"></audio>
      
      <audio data-hf-id="hf-5n69" id="sfx-b5-whoosh" class="clip" src="assets/sfx/whoosh-short.mp3" data-start="28.0" data-duration="0.57" data-track-index="11"></audio>
      <audio data-hf-id="hf-9icc" id="sfx-b5-ping" class="clip" src="assets/sfx/ping.mp3" data-start="29.6" data-duration="1.32" data-track-index="12"></audio>
      
      <audio data-hf-id="hf-6eul" id="sfx-b6-bass" class="clip" src="assets/sfx/impact-bass-1.mp3" data-start="35.4" data-duration="1.95" data-track-index="13"></audio>
      <audio data-hf-id="hf-vhte" id="sfx-b6-glitch" class="clip" src="assets/sfx/glitch-1.mp3" data-start="43.0" data-duration="1.0" data-track-index="14"></audio>
      
      <audio data-hf-id="hf-u1wm" id="sfx-b7-pop" class="clip" src="assets/sfx/pop.mp3" data-start="63.8" data-duration="0.72" data-track-index="15"></audio>
      <audio data-hf-id="hf-tu5i" id="sfx-b8-chime" class="clip" src="assets/sfx/chime.mp3" data-start="70.4" data-duration="2.5" data-track-index="16"></audio>

      <!-- Beat 1: Title Card (Track 1) -->
      <div data-hf-id="hf-2jkr" id="beat-1" class="clip beat-container" data-composition-id="beat-1" data-composition-src="compositions/beat-1-title.html" data-start="0" data-duration="10" data-track-index="1"></div>

      <!-- Beat 2: QA Bottleneck -->
      <div data-hf-id="hf-gt1j" id="beat-2" class="clip beat-container" data-composition-id="beat-2" data-composition-src="compositions/beat-2-qa.html" data-start="10" data-duration="10" data-track-index="1"></div>

      <!-- Beat 3: QE Continuous -->
      <div data-hf-id="hf-sp7j" id="beat-3" class="clip beat-container" data-composition-id="beat-3" data-composition-src="compositions/beat-3-qe.html" data-start="20" data-duration="10" data-track-index="1"></div>

      <!-- Beat 4: Differences comparison -->
      <div data-hf-id="hf-wy6p" id="beat-4" class="clip beat-container" data-composition-id="beat-4" data-composition-src="compositions/beat-4-differences.html" data-start="30" data-duration="10" data-track-index="1"></div>

      <!-- Beat 5: Feedback loops circle -->
      <div data-hf-id="hf-w6ry" id="beat-5" class="clip beat-container" data-composition-id="beat-5" data-composition-src="compositions/beat-5-loops.html" data-start="40" data-duration="10" data-track-index="1"></div>

      <!-- Beat 6: Sprint conveyor simulation -->
      <div data-hf-id="hf-5myl" id="beat-6" class="clip beat-container" data-composition-id="beat-6" data-composition-src="compositions/beat-6-simulation.html" data-start="50" data-duration="42" data-track-index="1"></div>

      <!-- Beat 7: ROI details -->
      <div data-hf-id="hf-jly2" id="beat-7" class="clip beat-container" data-composition-id="beat-7" data-composition-src="compositions/beat-7-roi.html" data-start="92" data-duration="10" data-track-index="1"></div>

      <!-- Beat 8: Outro CTA -->
      <div data-hf-id="hf-8p8f" id="beat-8" class="clip beat-container" data-composition-id="beat-8" data-composition-src="compositions/beat-8-outro.html" data-start="102" data-duration="8.57" data-track-index="1"></div>

      <script>
        window.__timelines = window.__timelines || {};

        // Master Timing Configurations
        window.MASTER_BEAT_DURATION = 10; // Scaled standard beat duration (from 7s to 10s)
        window.BEAT_MULTIPLIERS = {
          "beat-1": 1.0,
          "beat-2": 1.0,
          "beat-3": 1.0,
          "beat-4": 1.0,
          "beat-5": 1.0,
          "beat-6": 4.2,  // 42s when master is 10s (scaled by 1.5x from original 28s)
          "beat-7": 1.0,
          "beat-8": 6/7   // 8.57s when master is 10s (scaled from 6s to preserve proportions)
        };

        // Sound effect configuration mapping to scale trigger times dynamically
        const SFX_CONFIGS = [
          { id: "sfx-b1-chime", beatId: "beat-1", relStart: 0.2, duration: 2.5, origBeatDur: 3.5 },
          { id: "sfx-b2-whoosh", beatId: "beat-2", relStart: 0, duration: 0.57, origBeatDur: 3.5 },
          { id: "sfx-b2-error", beatId: "beat-2", relStart: 0.8, duration: 1.62, origBeatDur: 3.5 },
          { id: "sfx-b3-whoosh", beatId: "beat-3", relStart: 0, duration: 0.57, origBeatDur: 3.5 },
          { id: "sfx-b3-chime", beatId: "beat-3", relStart: 0.8, duration: 2.5, origBeatDur: 3.5 },
          { id: "sfx-b4-pop1", beatId: "beat-4", relStart: 0.6, duration: 0.72, origBeatDur: 3.5 },
          { id: "sfx-b4-pop2", beatId: "beat-4", relStart: 1.3, duration: 0.72, origBeatDur: 3.5 },
          { id: "sfx-b4-pop3", beatId: "beat-4", relStart: 2.0, duration: 0.72, origBeatDur: 3.5 },
          { id: "sfx-b4-pop4", beatId: "beat-4", relStart: 2.7, duration: 0.72, origBeatDur: 3.5 },
          { id: "sfx-b5-whoosh", beatId: "beat-5", relStart: 0, duration: 0.57, origBeatDur: 3.5 },
          { id: "sfx-b5-ping", beatId: "beat-5", relStart: 0.8, duration: 1.32, origBeatDur: 3.5 },
          { id: "sfx-b6-bass", beatId: "beat-6", relStart: 0.1, duration: 1.95, origBeatDur: 7.0 },
          { id: "sfx-b6-glitch", beatId: "beat-6", relStart: 2.0, duration: 1.0, origBeatDur: 7.0 },
          { id: "sfx-b7-pop", beatId: "beat-7", relStart: 0.4, duration: 0.72, origBeatDur: 3.5 },
          { id: "sfx-b8-chime", beatId: "beat-8", relStart: 0.2, duration: 2.5, origBeatDur: 3.0 }
        ];

        // 1. Calculate total duration dynamically
        const beatIds = ["beat-1", "beat-2", "beat-3", "beat-4", "beat-5", "beat-6", "beat-7", "beat-8"];
        let totalDuration = 0;
        beatIds.forEach(id => {
          totalDuration += window.MASTER_BEAT_DURATION * window.BEAT_MULTIPLIERS[id];
        });

        // Update DOM attributes on root and background audio
        document.getElementById("master-root").setAttribute("data-duration", totalDuration);
        document.getElementById("bgm").setAttribute("data-duration", totalDuration);

        // 2. Loop over and position each beat div and its associated sound effects
        let currentStart = 0;
        const fadeDuration = 0.3;
        const masterTL = gsap.timeline({ paused: true });

        beatIds.forEach((id, index) => {
          const mult = window.BEAT_MULTIPLIERS[id];
          const duration = window.MASTER_BEAT_DURATION * mult;
          const el = document.getElementById(id);

          // Update beat element attributes in DOM
          el.setAttribute("data-start", currentStart);
          el.setAttribute("data-duration", duration);

          // Update SFX triggers in DOM
          SFX_CONFIGS.filter(sfx => sfx.beatId === id).forEach(sfxConf => {
            const sfxEl = document.getElementById(sfxConf.id);
            // Calculate scale factor relative to original timing design (3.5s standard, 7s beat-6, 3s beat-8)
            const scale = duration / sfxConf.origBeatDur;
            const sfxStart = currentStart + (sfxConf.relStart * scale);
            
            sfxEl.setAttribute("data-start", sfxStart);
            sfxEl.setAttribute("data-duration", sfxConf.duration);
          });

          // Add transition crossfades to master GSAP timeline
          if (index === 0) {
            masterTL.set(el, { opacity: 1 }, 0);
            masterTL.fromTo(el, { opacity: 1 }, { opacity: 0, duration: fadeDuration }, currentStart + duration - fadeDuration);
            masterTL.set(el, { opacity: 0 }, currentStart + duration);
          } else {
            masterTL.fromTo(el, { opacity: 0 }, { opacity: 1, duration: fadeDuration }, currentStart);
            if (index < beatIds.length - 1) {
              masterTL.to(el, { opacity: 0, duration: fadeDuration }, currentStart + duration - fadeDuration);
              masterTL.set(el, { opacity: 0 }, currentStart + duration);
            }
          }

          currentStart += duration;
        });

        window.__timelines["master"] = masterTL;
      </script>
    </div>
  </body>
</html>
